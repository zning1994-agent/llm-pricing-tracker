<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Pricing & Benchmark Tracker - Demo</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .demo-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .demo-title {
      color: white;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
    }

    .demo-subtitle {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.125rem;
    }

    .demo-section {
      margin-bottom: 2rem;
    }

    .section-title {
      color: white;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 1rem;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
    }

    .demo-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .demo-button {
      padding: 0.75rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: #667eea;
      background: white;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .demo-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
    }

    .demo-button.active {
      background: #667eea;
      color: white;
    }

    /* Shared Component Styles */
    .card-container {
      --primary-color: #3b82f6;
      --primary-hover: #2563eb;
      --secondary-color: #64748b;
      --success-color: #10b981;
      --warning-color: #f59e0b;
      --error-color: #ef4444;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);

      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 1.5rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: var(--text-primary);
      background-color: var(--bg-primary);
      border-radius: 1rem;
      box-shadow: var(--shadow-lg);
    }

    .card-header {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0;
      background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .card-subtitle {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin: 0;
    }

    /* Filter Chips */
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .filter-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text-secondary);
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 9999px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-chip:hover {
      background-color: var(--bg-tertiary);
    }

    .filter-chip.active {
      color: var(--chip-color, var(--primary-color));
      background-color: rgba(59, 130, 246, 0.1);
      border-color: var(--chip-color, var(--primary-color));
    }

    .chip-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    /* Table Styles */
    .table-wrapper {
      overflow-x: auto;
      border-radius: 0.75rem;
      border: 1px solid var(--border-color);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    .data-table th {
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      background-color: var(--bg-tertiary);
      text-align: left;
      border-bottom: 2px solid var(--border-color);
    }

    .data-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border-color);
      font-size: 0.875rem;
    }

    .data-table tbody tr {
      transition: background-color 0.15s ease;
    }

    .data-table tbody tr:hover {
      background-color: var(--bg-secondary);
    }

    .data-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Provider Badge */
    .provider-badge {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      font-size: 0.6875rem;
      font-weight: 600;
      border-radius: 0.25rem;
    }

    .provider-openai {
      background-color: rgba(16, 163, 74, 0.1);
      color: #10a341;
    }

    .provider-anthropic {
      background-color: rgba(239, 68, 68, 0.1);
      color: #ef4444;
    }

    .provider-google {
      background-color: rgba(59, 130, 246, 0.1);
      color: #3b82f6;
    }

    .provider-mistral {
      background-color: rgba(139, 92, 246, 0.1);
      color: #8b5cf6;
    }

    .provider-meta {
      background-color: rgba(0, 123, 255, 0.1);
      color: #007bff;
    }

    /* Score Colors */
    .score-high {
      color: var(--success-color);
      font-weight: 600;
    }

    .score-medium {
      color: var(--warning-color);
      font-weight: 600;
    }

    .score-low {
      color: var(--error-color);
      font-weight: 600;
    }

    /* Summary Cards */
    .summary-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin: 1.5rem 0;
    }

    .summary-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      min-width: 150px;
      text-align: center;
    }

    .summary-card.best {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
      border-color: rgba(16, 185, 129, 0.3);
    }

    .summary-card.worst {
      background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
      border-color: rgba(239, 68, 68, 0.3);
    }

    .summary-label {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.25rem;
    }

    .summary-model {
      font-size: 0.875rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .summary-score {
      font-size: 1.25rem;
      font-weight: 800;
      font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
    }

    .summary-card.best .summary-score {
      color: var(--success-color);
    }

    .summary-card.worst .summary-score {
      color: var(--error-color);
    }

    /* Chart Container */
    .chart-container {
      margin: 1.5rem 0;
      min-height: 400px;
    }

    /* Legend */
    .legend-grid {
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border-color);
    }

    .legend-grid h4 {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin: 0 0 1rem 0;
    }

    .legend-items {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
    }

    .legend-item {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-top: 0.25rem;
    }

    .legend-text {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .legend-text strong {
      color: var(--text-primary);
    }

    /* Benchmark Colors */
    .benchmark-mmlu { --chip-color: #3b82f6; }
    .benchmark-humaneval { --chip-color: #10b981; }
    .benchmark-math { --chip-color: #f59e0b; }
    .benchmark-mgsm { --chip-color: #8b5cf6; }

    /* Responsive */
    @media (max-width: 768px) {
      .demo-title {
        font-size: 1.75rem;
      }

      .card-container {
        padding: 1rem;
        border-radius: 0.75rem;
      }

      .card-title {
        font-size: 1.25rem;
      }

      .filter-chip {
        padding: 0.375rem 0.75rem;
        font-size: 0.8125rem;
      }
    }

    /* Dark Mode */
    @media (prefers-color-scheme: dark) {
      .card-container {
        --bg-primary: #1e293b;
        --bg-secondary: #0f172a;
        --bg-tertiary: #334155;
        --text-primary: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --border-color: #334155;
      }
    }
  </style>
</head>
<body>
  <div class="demo-container">
    <div class="demo-header">
      <h1 class="demo-title">LLM Pricing & Benchmark Tracker</h1>
      <p class="demo-subtitle">Compare LLM pricing, performance, and benchmarks</p>
    </div>

    <!-- Benchmark Chart Section -->
    <div class="demo-section">
      <h2 class="section-title">Benchmark Performance</h2>
      <div id="benchmark-root"></div>
    </div>

    <!-- Pricing Table Section -->
    <div class="demo-section">
      <h2 class="section-title">Token Pricing</h2>
      <div id="pricing-root"></div>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useMemo } = React;
    const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine } = Recharts;

    // Benchmark Colors
    const BENCHMARK_COLORS = {
      MMLU: '#3b82f6',
      HumanEval: '#10b981',
      MATH: '#f59e0b',
      MGSM: '#8b5cf6',
    };

    // Provider Colors
    const PROVIDER_COLORS = {
      OpenAI: '#10a341',
      Anthropic: '#ef4444',
      Google: '#3b82f6',
      Mistral: '#8b5cf6',
      Meta: '#007bff',
    };

    // Benchmark Data
    const benchmarkData = [
      { modelId: 'gpt-4-turbo', modelName: 'GPT-4 Turbo', provider: 'OpenAI', mmlu: 86.4, humaneval: 90.2, math: 73.4, mgsm: 79.8 },
      { modelId: 'claude-3-opus', modelName: 'Claude 3 Opus', provider: 'Anthropic', mmlu: 88.7, humaneval: 84.0, math: 60.1, mgsm: 83.6 },
      { modelId: 'claude-3-sonnet', modelName: 'Claude 3 Sonnet', provider: 'Anthropic', mmlu: 79.0, humaneval: 73.0, math: 52.3, mgsm: 72.6 },
      { modelId: 'gemini-1.5-pro', modelName: 'Gemini 1.5 Pro', provider: 'Google', mmlu: 85.9, humaneval: 84.6, math: 58.5, mgsm: 79.4 },
      { modelId: 'gemini-1.5-flash', modelName: 'Gemini 1.5 Flash', provider: 'Google', mmlu: 85.0, humaneval: 79.5, math: 52.1, mgsm: 74.8 },
      { modelId: 'mistral-large', modelName: 'Mistral Large', provider: 'Mistral', mmlu: 81.2, humaneval: 81.0, math: 51.2, mgsm: 68.4 },
      { modelId: 'llama-3-70b', modelName: 'Llama 3 70B', provider: 'Meta', mmlu: 82.0, humaneval: 81.7, math: 51.8, mgsm: 69.5 },
    ];

    // Pricing Data
    const pricingData = [
      { id: 'gpt-4-turbo', name: 'GPT-4 Turbo', provider: 'OpenAI', model: 'gpt-4-turbo-2024-04-09', inputPrice: 10, outputPrice: 30, contextWindow: 128000, isPopular: true },
      { id: 'claude-3-opus', name: 'Claude 3 Opus', provider: 'Anthropic', model: 'claude-3-opus-20240229', inputPrice: 15, outputPrice: 75, contextWindow: 200000, isPopular: true },
      { id: 'claude-3-sonnet', name: 'Claude 3 Sonnet', provider: 'Anthropic', model: 'claude-3-sonnet-20240229', inputPrice: 3, outputPrice: 15, contextWindow: 200000 },
      { id: 'gemini-1.5-pro', name: 'Gemini 1.5 Pro', provider: 'Google', model: 'gemini-1.5-pro-preview-0514', inputPrice: 3.5, outputPrice: 10.5, contextWindow: 1000000, isPopular: true },
      { id: 'gemini-1.5-flash', name: 'Gemini 1.5 Flash', provider: 'Google', model: 'gemini-1.5-flash-preview-0514', inputPrice: 0.35, outputPrice: 0.53, contextWindow: 1000000 },
      { id: 'mistral-large', name: 'Mistral Large', provider: 'Mistral', model: 'mistral-large-2407', inputPrice: 4, outputPrice: 12, contextWindow: 128000, isPopular: true },
      { id: 'llama-3-70b', name: 'Llama 3 70B', provider: 'Meta', model: 'llama-3-70b-instruct', inputPrice: 0.65, outputPrice: 2.75, contextWindow: 8192 },
    ];

    // Benchmark Chart Component
    function BenchmarkChart() {
      const [selectedBenchmarks, setSelectedBenchmarks] = useState(['MMLU', 'HumanEval', 'MATH', 'MGSM']);
      const [sortKey, setSortKey] = useState('mmlu');
      const [sortDirection, setSortDirection] = useState('desc');

      const processedData = useMemo(() => {
        return benchmarkData.map(item => {
          const scores = selectedBenchmarks.map(b => item[b.toLowerCase()]).filter(s => typeof s === 'number');
          const avg = scores.length > 0 ? scores.reduce((a, b) => a + b, 0) / scores.length : 0;
          return { ...item, overall: Math.round(avg * 10) / 10 };
        }).sort((a, b) => {
          const aVal = a[sortKey] || a.overall;
          const bVal = b[sortKey] || b.overall;
          return sortDirection === 'asc' ? aVal - bVal : bVal - aVal;
        });
      }, [selectedBenchmarks, sortKey, sortDirection]);

      const bestModel = processedData[0];
      const worstModel = processedData[processedData.length - 1];

      const toggleBenchmark = (benchmark) => {
        setSelectedBenchmarks(prev =>
          prev.includes(benchmark) ? prev.filter(b => b !== benchmark) : [...prev, benchmark]
        );
      };

      const CustomTooltip = ({ active, payload, label }) => {
        if (!active || !payload || !payload.length) return null;
        const model = benchmarkData.find(m => m.modelName === label);
        return (
          <div style={{ background: 'white', padding: '0.75rem', borderRadius: '0.5rem', border: '1px solid #e2e8f0', boxShadow: '0 4px 6px rgba(0,0,0,0.1)' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '0.5rem', borderBottom: '1px solid #e2e8f0', paddingBottom: '0.5rem' }}>
              <strong>{label}</strong>
              <span style={{ color: PROVIDER_COLORS[model?.provider] }}>{model?.provider}</span>
            </div>
            {payload.map((entry, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.875rem' }}>
                <span>{entry.name}:</span>
                <strong style={{ fontFamily: 'monospace' }}>{entry.value.toFixed(1)}%</strong>
              </div>
            ))}
          </div>
        );
      };

      const getScoreClass = (score) => {
        if (score >= 80) return 'score-high';
        if (score >= 60) return 'score-medium';
        return 'score-low';
      };

      return (
        <div className="card-container">
          <div className="card-header">
            <h2 className="card-title">LLM Benchmark Performance</h2>
            <p className="card-subtitle">Compare performance across MMLU, HumanEval, MATH, and MGSM benchmarks</p>
            <div className="filter-chips">
              {['MMLU', 'HumanEval', 'MATH', 'MGSM'].map(b => (
                <button
                  key={b}
                  className={`filter-chip benchmark-${b.toLowerCase()} ${selectedBenchmarks.includes(b) ? 'active' : ''}`}
                  onClick={() => toggleBenchmark(b)}
                  style={{ '--chip-color': BENCHMARK_COLORS[b] }}
                >
                  <span className="chip-dot" style={{ backgroundColor: BENCHMARK_COLORS[b] }} />
                  {b}
                </button>
              ))}
            </div>
          </div>

          <div className="chart-container">
            {selectedBenchmarks.length > 0 ? (
              <ResponsiveContainer width="100%" height={400}>
                <BarChart data={processedData} margin={{ top: 20, right: 30, left: 20, bottom: 60 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#e2e8f0" />
                  <XAxis dataKey="modelName" tick={{ fill: '#475569', fontSize: 12 }} angle={-45} textAnchor="end" height={80} />
                  <YAxis domain={[0, 100]} tick={{ fill: '#475569', fontSize: 12 }} tickFormatter={v => `${v}%`} />
                  <Tooltip content={<CustomTooltip />} />
                  <Legend />
                  <ReferenceLine y={75} stroke="#94a3b8" strokeDasharray="5 5" label={{ value: '75% Target', position: 'insideTopRight', fill: '#94a3b8' }} />
                  {selectedBenchmarks.map(b => (
                    <Bar key={b} dataKey={b.toLowerCase()} name={b} fill={BENCHMARK_COLORS[b]} radius={[4, 4, 0, 0]} />
                  ))}
                </BarChart>
              </ResponsiveContainer>
            ) : (
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: 400, color: '#94a3b8' }}>
                Select at least one benchmark to display
              </div>
            )}
          </div>

          <div className="summary-cards">
            <div className="summary-card best">
              <span className="summary-label">Best Overall</span>
              <span className="summary-model">{bestModel?.modelName}</span>
              <span className="summary-score">{bestModel?.overall}%</span>
            </div>
            <div className="summary-card worst">
              <span className="summary-label">Needs Improvement</span>
              <span className="summary-model">{worstModel?.modelName}</span>
              <span className="summary-score">{worstModel?.overall}%</span>
            </div>
          </div>

          <div className="table-wrapper">
            <table className="data-table">
              <thead>
                <tr>
                  <th>Model</th>
                  <th>Provider</th>
                  {selectedBenchmarks.map(b => <th key={b}>{b}</th>)}
                  {selectedBenchmarks.length > 1 && <th>Average</th>}
                </tr>
              </thead>
              <tbody>
                {processedData.map(model => (
                  <tr key={model.modelId}>
                    <td><strong>{model.modelName}</strong></td>
                    <td><span className={`provider-badge provider-${model.provider.toLowerCase()}`}>{model.provider}</span></td>
                    {selectedBenchmarks.map(b => (
                      <td key={b}><span className={getScoreClass(model[b.toLowerCase()])}>{model[b.toLowerCase()].toFixed(1)}%</span></td>
                    ))}
                    {selectedBenchmarks.length > 1 && <td><strong style={{ color: '#3b82f6' }}>{model.overall}%</strong></td>}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="legend-grid">
            <h4>Benchmark Descriptions</h4>
            <div className="legend-items">
              <div className="legend-item">
                <span className="legend-color" style={{ backgroundColor: BENCHMARK_COLORS.MMLU }} />
                <div className="legend-text"><strong>MMLU</strong> - Massive Multitask Language Understanding. Tests knowledge across 57 subjects.</div>
              </div>
              <div className="legend-item">
                <span className="legend-color" style={{ backgroundColor: BENCHMARK_COLORS.HumanEval }} />
                <div className="legend-text"><strong>HumanEval</strong> - Code generation benchmark with Python programming problems.</div>
              </div>
              <div className="legend-item">
                <span className="legend-color" style={{ backgroundColor: BENCHMARK_COLORS.MATH }} />
                <div className="legend-text"><strong>MATH</strong> - Mathematical problem solving with 12,500 competition math problems.</div>
              </div>
              <div className="legend-item">
                <span className="legend-color" style={{ backgroundColor: BENCHMARK_COLORS.MGSM }} />
                <div className="legend-text"><strong>MGSM</strong> - Multilingual Grade School Math across 10 languages.</div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Pricing Table Component
    function PricingTable() {
      const [sortKey, setSortKey] = useState('inputPrice');
      const [sortDir, setSortDir] = useState('asc');
      const [filter, setFilter] = useState('all');
      const [search, setSearch] = useState('');

      const filteredData = useMemo(() => {
        let data = [...pricingData];
        if (filter !== 'all') data = data.filter(p => p.provider === filter);
        if (search) {
          const q = search.toLowerCase();
          data = data.filter(p => p.name.toLowerCase().includes(q) || p.provider.toLowerCase().includes(q));
        }
        data.sort((a, b) => {
          const aVal = a[sortKey];
          const bVal = b[sortKey];
          return sortDir === 'asc' ? aVal - bVal : bVal - aVal;
        });
        return data;
      }, [filter, search, sortKey, sortDir]);

      const lowestPrices = {
        input: Math.min(...pricingData.map(p => p.inputPrice)),
        output: Math.min(...pricingData.map(p => p.outputPrice)),
      };

      const formatPrice = (p) => `$${p.toFixed(p < 1 ? 4 : 2)}`;
      const formatContext = (c) => c >= 1000000 ? `${c/1000000}M` : `${c/1000}K`;

      return (
        <div className="card-container">
          <div className="card-header">
            <h2 className="card-title">Token Pricing Comparison</h2>
            <p className="card-subtitle">Compare pricing across different LLM providers</p>
            <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap', justifyContent: 'center' }}>
              <input
                type="text"
                placeholder="Search models..."
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{ padding: '0.5rem 1rem', borderRadius: '0.5rem', border: '1px solid #e2e8f0', fontSize: '0.875rem', minWidth: 200 }}
              />
              <select
                value={filter}
                onChange={e => setFilter(e.target.value)}
                style={{ padding: '0.5rem 2rem 0.5rem 1rem', borderRadius: '0.5rem', border: '1px solid #e2e8f0', fontSize: '0.875rem', cursor: 'pointer' }}
              >
                <option value="all">All Providers</option>
                <option value="OpenAI">OpenAI</option>
                <option value="Anthropic">Anthropic</option>
                <option value="Google">Google</option>
                <option value="Mistral">Mistral</option>
                <option value="Meta">Meta</option>
              </select>
            </div>
          </div>

          <div className="table-wrapper">
            <table className="data-table">
              <thead>
                <tr>
                  <th>Model</th>
                  <th>Provider</th>
                  <th>Input / 1M tokens</th>
                  <th>Output / 1M tokens</th>
                  <th>Context Window</th>
                </tr>
              </thead>
              <tbody>
                {filteredData.map(model => (
                  <tr key={model.id}>
                    <td>
                      <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                        <strong>{model.name}</strong>
                        {model.isPopular && <span style={{ background: 'linear-gradient(135deg, #3b82f6, #8b5cf6)', color: 'white', padding: '0.125rem 0.5rem', borderRadius: '9999px', fontSize: '0.625rem', fontWeight: 600 }}>Popular</span>}
                      </div>
                    </td>
                    <td><span className={`provider-badge provider-${model.provider.toLowerCase()}`}>{model.provider}</span></td>
                    <td><span style={{ fontFamily: 'monospace', fontWeight: 600, color: model.inputPrice === lowestPrices.input ? '#10b981' : 'inherit' }}>{model.inputPrice === lowestPrices.input && '💰 '}{formatPrice(model.inputPrice)}</span></td>
                    <td><span style={{ fontFamily: 'monospace', fontWeight: 600, color: model.outputPrice === lowestPrices.output ? '#10b981' : 'inherit' }}>{model.outputPrice === lowestPrices.output && '💰 '}{formatPrice(model.outputPrice)}</span></td>
                    <td><span style={{ padding: '0.25rem 0.75rem', background: '#f1f5f9', borderRadius: '0.375rem', fontSize: '0.875rem' }}>{formatContext(model.contextWindow)}</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <p style={{ fontSize: '0.75rem', color: '#94a3b8', textAlign: 'center', marginTop: '1rem' }}>
            * Prices are indicative and may vary. Please check official provider documentation.
          </p>
        </div>
      );
    }

    // Render Components
    const benchmarkRoot = document.getElementById('benchmark-root');
    const pricingRoot = document.getElementById('pricing-root');

    if (benchmarkRoot) ReactDOM.createRoot(benchmarkRoot).render(<BenchmarkChart />);
    if (pricingRoot) ReactDOM.createRoot(pricingRoot).render(<PricingTable />);
  </script>
</body>
</html>
